{%{% extends "app/base.html" %}%}
{%load static %}
{% block banner_slider %}
<div id="carouselExampleDark" class="carousel carousel-dark slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active" data-bs-interval="10000">
      <img src="{% static "app/banner/images/b1.jpg" %}" class="d-block w-100" alt="Sữa demo1" height='480'>
      <div class="carousel-caption d-none d-md-block bg-sucess text-white">
        <h5>Sữa demo1</h5>
        <p>ngon</p>
      </div>
    </div>
    <div class="carousel-item" data-bs-interval="2000">
      <img src="{% static "app/banner/images/b2.jpg" %}" class="d-block w-100" alt="Sữa demo2"height='480'>
      <div class="carousel-caption d-none d-md-block bg-sucess text-white">
        <h5>Sữa demo2</h5>
        <p>đắng</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="{% static "app/banner/images/b3.jpg" %}" class="d-block w-100" alt="Sữa demo3"height='480'>
      <div class="carousel-caption d-none d-md-block bg-sucess text-white">
        <h5>Sữa demo3</h5>
        <p>ngọt</p>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
{% endblock banner_slider %}
{% block main-content %}
wellcome mysite
{%endblock main-content%}
